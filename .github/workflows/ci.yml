name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: build + test ────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore backend/Backend.sln

      - name: Vulnerability scan (NuGet)
        run: |
          dotnet list backend/Backend.sln package --vulnerable --include-transitive 2>&1 | tee /tmp/nuget-vuln.txt
          if grep -qiE "has the following vulnerable packages" /tmp/nuget-vuln.txt; then
            echo "::error::Vulnerable NuGet packages detected — see above output"
            exit 1
          fi

      - name: Build
        run: dotnet build backend/Backend.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Backend.sln --no-build --configuration Release

  # ─── Frontend: lint + test + build ───────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Vulnerability scan (npm audit)
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npm run test:run
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Dependency Review (PRs only) ────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: "GPL-2.0, GPL-3.0, AGPL-3.0"
